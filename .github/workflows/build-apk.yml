name: 构建安卓APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v4

    - name: 2. 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3.5 清理旧文件  <-- 新增这一步，防止缓存错误
      run: rm -rf ~/.gradle

    - name: 4. 进入项目目录
      run: |
        cd ccicVgL9wFGk60peXyOp-master-4168c607bdf74744eb4dbe8079cd114ef8e5a32c
        ls -la

    - name: 5. 开始打包 Debug 版
      run: |
        cd ccicVgL9wFGk60peXyOp-master-4168c607bdf74744eb4dbe8079cd114ef8e5a32c
        bash gradlew assembleDebug  <-- 这里改成了 bash gradlew

    - name: 6. 上传 APK 文件
      uses: actions/upload-artifact@v4
      with:
        name: 自动生成的APK
        path: ccicVgL9wFGk60peXyOp-master-4168c607bdf74744eb4dbe8079cd114ef8e5a32c/app/build/outputs/apk/debug/*.apk
